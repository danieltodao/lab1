name: CD - Entrega Contínua Docker

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publicar_imagem:
    name: Build e Push para Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Clonar o Repositório
        uses: actions/checkout@v4

      # 1. Fazendo o Login usando o nosso Cofre (Secrets)
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Quem estiver usando autenticação por terceiros ou federado, gerar o Personal Access Token
      #- name: Log in to Docker Hub
      #    uses: docker/login-action@v3
      #    with:
      #      username: ${{ secrets.DOCKERHUB_USERNAME }}
      #      password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. A Mágica: Constrói a imagem e joga para o Registry com a MESMA tag do Git
      - name: Build e Push da Imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Exemplo: seu/sua-conta-docker/kanban-api:v1.0.0
          tags: ${{ secrets.DOCKER_USERNAME }}/kanban-api:${{ github.ref_name }}
